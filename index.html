<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<meta property="og:title" content="理想罗盘 — 发现你想成为什么样的人">
<meta property="og:description" content="不是「你能做什么工作」，而是「你想成为谁」。一个帮你探索、规划和分享理想的互动工具。">
<meta property="og:type" content="website">
<meta property="og:site_name" content="理想罗盘">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='29' fill='none' stroke='%23d97706' stroke-width='3'/%3E%3Ccircle cx='32' cy='32' r='4' fill='%23d97706'/%3E%3Cpolygon points='32,4 36,28 32,25 28,28' fill='%23d97706'/%3E%3Cpolygon points='32,60 28,36 32,39 36,36' fill='%23d97706' opacity='0.5'/%3E%3Cpolygon points='4,32 28,28 25,32 28,36' fill='%23d97706' opacity='0.4'/%3E%3Cpolygon points='60,32 36,36 39,32 36,28' fill='%23d97706' opacity='0.4'/%3E%3C/svg%3E">
<link rel="stylesheet" href="style.css">

<body>
<!-- Welcome overlay -->
<div class="welcome-overlay" id="welcome-overlay">
  <div class="welcome-card">
    <span class="w-icon">🧭</span>
    <h2>欢迎来到理想罗盘</h2>
    <p class="w-desc">不是「你能做什么工作」，而是<strong>「你想成为谁」</strong>。</p>
    <p class="w-desc">在这里，你可以通过深度探索找到属于自己的<strong>理想途径</strong>，制定修炼计划，点亮里程碑，和朋友分享你的方向。</p>
    <p class="w-hint">点击任意位置或等待 3 秒自动进入</p>
  </div>
</div>

<div class="app-shell" id="app">

  <div class="topbar">
    <span class="logo" onclick="navigate('home')">理想罗盘</span>
    <span style="cursor:pointer;font-size:1.1rem;" id="theme-toggle" onclick="toggleTheme()" title="切换深色/浅色模式">🌙</span>
    <div class="topbar-links">
      <span class="topbar-link active" data-nav="home" onclick="navigate('home')">探索</span>
      <span class="topbar-link" data-nav="action" onclick="navigate('action')">行理想</span>
      <span class="topbar-link" data-nav="profile" onclick="navigate('profile')">我的档案</span>
      <span class="topbar-link" data-nav="community" onclick="navigate('community')">广场</span>
    </div>
  </div>

  <!-- HOME SCREEN -->
  <div class="screen active" id="screen-home">
    <div class="subtab-bar" id="home-subtabs">
      <span class="subtab active" data-sub="paths" onclick="switchHomeTab('paths')">寻路</span>
      <span class="subtab" data-sub="books" onclick="switchHomeTab('books')">理想之书</span>
      <span class="subtab" data-sub="narratives" onclick="switchHomeTab('narratives')">宏大叙事</span>
    </div>
    <div id="home-tab-content" class="fade-in"></div>
  </div>

  <!-- EXPLORATION SCREEN -->
  <div class="screen" id="screen-explore">
    <div class="card fade-in" id="explore-card"></div>
  </div>

  <!-- ACTION SCREEN -->
  <div class="screen" id="screen-action">
    <div class="card fade-in" id="action-card"></div>
  </div>

  <!-- PROFILE SCREEN -->
  <div class="screen" id="screen-profile">
    <div class="card fade-in" id="profile-card"></div>
  </div>

  <!-- COMMUNITY SCREEN -->
  <div class="screen" id="screen-community">
    <div class="card fade-in" id="community-card"></div>
  </div>

</div>
<div id="modal-container"></div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
