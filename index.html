<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>理想罗盘 — 发现你想成为什么样的人</title>
<meta property="og:title" content="理想罗盘 — 发现你想成为什么样的人">
<meta property="og:description" content="不是「你能做什么工作」，而是「你想成为谁」。一个帮你探索、规划和分享理想的互动工具。">
<meta property="og:type" content="website">
<meta property="og:site_name" content="理想罗盘">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='29' fill='none' stroke='%23d97706' stroke-width='3'/%3E%3Ccircle cx='32' cy='32' r='4' fill='%23d97706'/%3E%3Cpolygon points='32,4 36,28 32,25 28,28' fill='%23d97706'/%3E%3Cpolygon points='32,60 28,36 32,39 36,36' fill='%23d97706' opacity='0.5'/%3E%3Cpolygon points='4,32 28,28 25,32 28,36' fill='%23d97706' opacity='0.4'/%3E%3Cpolygon points='60,32 36,36 39,32 36,28' fill='%23d97706' opacity='0.4'/%3E%3C/svg%3E">
<style>
  :root {
    --bg: #fdfaf5; --fg: #292524; --fg2: #57534e; --muted: #a8a29e;
    --accent: #d97706; --accent2: #f59e0b; --accent-bg: #fffbeb;
    --accent-border: #fde68a; --card: #ffffff; --border: #e7e5e4;
    --green: #16a34a; --green-bg: #f0fdf4; --green-border: #bbf7d0;
    --radius: 14px; --radius-sm: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    background: var(--bg); color: var(--fg); min-height: 100vh; line-height: 1.75; letter-spacing: 0.01em;
  }
  .app-shell { max-width: 680px; margin: 0 auto; padding: 32px 20px 60px; }
  .topbar { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .logo { font-weight: 700; font-size: 1.1rem; color: var(--accent); cursor: pointer; letter-spacing: 0.02em; }
  .topbar-links { display: flex; gap: 16px; flex-wrap: wrap; }
  .topbar-link { font-size: 0.82rem; color: var(--fg2); cursor: pointer; transition: color 0.15s; font-weight: 500; white-space: nowrap; }
  .topbar-link:hover, .topbar-link.active { color: var(--accent); }
  .screen { display: none; }
  .screen.active { display: block; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 36px 32px; margin-bottom: 20px; }
  h1 { font-size: 1.8rem; font-weight: 750; letter-spacing: 0.03em; line-height: 1.35; margin-bottom: 8px; }
  h2 { font-size: 1.35rem; font-weight: 700; letter-spacing: 0.02em; margin-bottom: 12px; }
  h3 { font-size: 1rem; font-weight: 650; margin-bottom: 6px; }
  .sub { color: var(--fg2); font-size: 0.95rem; margin-bottom: 24px; line-height: 1.65; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 26px; font-size: 0.93rem; font-weight: 600; border: none; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s; letter-spacing: 0.02em; font-family: inherit; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #b45309; }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--fg2); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ghost { background: transparent; color: var(--fg2); padding: 10px 16px; }
  .btn-ghost:hover { color: var(--fg); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-sm { padding: 7px 16px; font-size: 0.82rem; }
  .btn-green { background: var(--green); color: #fff; }
  .btn-green:hover { background: #15803d; }

  /* Sub-tabs */
  .subtab-bar { display: flex; gap: 6px; margin-bottom: 20px; border-bottom: 1.5px solid var(--border); padding-bottom: 0; }
  .subtab { padding: 8px 16px; font-size: 0.85rem; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1.5px; transition: all 0.15s; font-weight: 500; }
  .subtab:hover { color: var(--fg2); }
  .subtab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 650; }

  .path-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 500px) { .path-grid { grid-template-columns: 1fr; } }
  .path-card { border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: all 0.2s; background: var(--card); text-align: left; }
  .path-card:hover { border-color: var(--accent-border); background: var(--accent-bg); box-shadow: var(--shadow-md); }
  .path-card .emoji { font-size: 1.8rem; margin-bottom: 8px; display: block; }
  .path-card .title { font-weight: 650; font-size: 1rem; margin-bottom: 4px; }
  .path-card .hint { font-size: 0.8rem; color: var(--muted); line-height: 1.45; }

  .prompt-question { font-size: 1.15rem; font-weight: 650; margin-bottom: 14px; line-height: 1.5; }
  .text-input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 0.95rem; font-family: inherit; line-height: 1.6; resize: vertical; min-height: 100px; background: #fafaf9; transition: border-color 0.15s; color: var(--fg); }
  .text-input:focus { outline: none; border-color: var(--accent); background: var(--card); box-shadow: 0 0 0 3px rgba(217,119,6,0.08); }
  .text-input::placeholder { color: var(--muted); }
  .step-indicator { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; font-size: 0.82rem; color: var(--muted); }
  .step-dot-row { display: flex; gap: 5px; flex: 1; }
  .step-dot { height: 3px; flex: 1; border-radius: 2px; background: var(--border); transition: background 0.3s; }
  .step-dot.done { background: var(--accent-border); }
  .step-dot.current { background: var(--accent); }
  .tag-group { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
  .tag-btn { padding: 8px 16px; border: 1.5px solid var(--border); border-radius: 24px; font-size: 0.88rem; cursor: pointer; transition: all 0.15s; background: var(--card); color: var(--fg2); font-family: inherit; }
  .tag-btn:hover { border-color: var(--accent-border); background: var(--accent-bg); }
  .tag-btn.picked { border-color: var(--accent); background: #fef3c7; color: #92400e; font-weight: 600; }
  .profile-section { margin-bottom: 20px; }
  .profile-section h3 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); margin-bottom: 8px; }
  .profile-block { background: #fafaf9; border-radius: var(--radius-sm); padding: 16px; font-size: 0.95rem; line-height: 1.7; white-space: pre-wrap; color: var(--fg); }
  .profile-block.empty { color: var(--muted); font-style: italic; }
  .community-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
  .persona-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; background: var(--card); cursor: pointer; transition: all 0.15s; }
  .persona-card:hover { border-color: var(--accent-border); box-shadow: var(--shadow-md); }
  .persona-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .persona-name { font-weight: 650; font-size: 1rem; }
  .persona-date { font-size: 0.75rem; color: var(--muted); }
  .persona-statement { font-size: 0.9rem; color: var(--fg2); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .fade-in { animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal { background: var(--card); border-radius: var(--radius); max-width: 560px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
  hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }

  /* Reading preference */
  .reading-pref-bar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .reading-pref-btn { padding: 5px 12px; border: 1px solid var(--border); border-radius: 16px; font-size: 0.75rem; cursor: pointer; background: var(--card); color: var(--fg2); transition: all 0.15s; font-family: inherit; }
  .reading-pref-btn:hover { border-color: var(--accent-border); }
  .reading-pref-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .book-links { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .book-link { font-size: 0.75rem; padding: 3px 10px; border-radius: 12px; text-decoration: none; color: var(--accent); background: var(--accent-bg); transition: all 0.15s; }
  .book-link:hover { background: var(--accent-border); }

  /* Daily card */
  .daily-card { border: 1.5px solid var(--accent-border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; background: linear-gradient(135deg, var(--accent-bg), #fff); }
  .daily-card .daily-label { font-size: 0.72rem; font-weight: 650; letter-spacing: 0.04em; color: var(--accent); margin-bottom: 6px; text-transform: uppercase; }
  .daily-card .daily-text { font-size: 0.95rem; line-height: 1.65; color: var(--fg); }
  .daily-card .daily-source { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }

  /* Book cards */
  .book-card { display: flex; gap: 16px; padding: 18px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; background: var(--card); transition: all 0.15s; }
  .book-card:hover { border-color: var(--accent-border); box-shadow: var(--shadow-md); }
  .book-cover { width: 60px; height: 80px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; }
  .book-info { flex: 1; }
  .book-title { font-weight: 650; font-size: 0.95rem; margin-bottom: 2px; }
  .book-author { font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
  .book-why { font-size: 0.82rem; color: var(--accent); line-height: 1.5; }

  /* Narrative cards */
  .narrative-card { border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 14px; background: var(--card); transition: all 0.15s; }
  .narrative-card:hover { border-color: var(--accent-border); box-shadow: var(--shadow-md); }
  .narrative-number { font-size: 2rem; font-weight: 800; color: var(--accent); line-height: 1; margin-bottom: 4px; }
  .narrative-fact { font-size: 0.95rem; font-weight: 650; margin-bottom: 8px; line-height: 1.5; }
  .narrative-detail { font-size: 0.85rem; color: var(--fg2); line-height: 1.65; margin-bottom: 10px; }
  .narrative-reflection { font-size: 0.82rem; color: var(--accent); font-style: italic; }

  /* Achievement */
  .achievement-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 500px) { .achievement-grid { grid-template-columns: 1fr; } }
  .achievement-badge { border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; transition: all 0.2s; background: var(--card); }
  .achievement-badge.earned { border-color: var(--green-border); background: var(--green-bg); }
  .achievement-badge .badge-icon { font-size: 2rem; display: block; margin-bottom: 6px; }
  .achievement-badge .badge-name { font-weight: 650; font-size: 0.85rem; margin-bottom: 2px; }
  .achievement-badge .badge-date { font-size: 0.7rem; color: var(--muted); }
  .achievement-badge.locked { opacity: 0.5; }

  /* Milestone timeline */
  .milestone-item { display: flex; gap: 12px; padding: 14px 0; border-bottom: 1px solid #f5f5f4; align-items: flex-start; }
  .milestone-item:last-child { border-bottom: none; }
  .milestone-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 0.8rem; background: var(--card); }
  .milestone-check.checked { background: var(--green); border-color: var(--green); color: #fff; }
  .milestone-check:hover { border-color: var(--green); }
  .milestone-body { flex: 1; }
  .milestone-title { font-weight: 600; font-size: 0.9rem; }
  .milestone-desc { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  .milestone-done-title { text-decoration: line-through; color: var(--muted); }

  /* Resource card */
  .resource-card { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
  .resource-card:hover { border-color: var(--accent-border); background: #fafaf9; }
  .resource-card.selected { border-color: var(--accent); background: var(--accent-bg); }
  .resource-icon { font-size: 1.3rem; flex-shrink: 0; }
  .resource-info { flex: 1; }
  .resource-name { font-weight: 600; font-size: 0.88rem; }
  .resource-type { font-size: 0.72rem; color: var(--muted); }

  .share-bar { display: flex; gap: 8px; margin-top: 12px; }
  .copied-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--fg); color: #fff; padding: 10px 24px; border-radius: 24px; font-size: 0.85rem; z-index: 200; animation: fadeIn 0.3s ease; }
</style>
</head>
<body>
<div class="app-shell" id="app">

  <div class="topbar">
    <span class="logo" onclick="navigate('home')">理想罗盘</span>
    <div class="topbar-links">
      <span class="topbar-link active" data-nav="home" onclick="navigate('home')">探索</span>
      <span class="topbar-link" data-nav="action" onclick="navigate('action')">行理想</span>
      <span class="topbar-link" data-nav="profile" onclick="navigate('profile')">我的档案</span>
      <span class="topbar-link" data-nav="community" onclick="navigate('community')">广场</span>
    </div>
  </div>

  <!-- HOME SCREEN -->
  <div class="screen active" id="screen-home">
    <div class="subtab-bar" id="home-subtabs">
      <span class="subtab active" data-sub="paths" onclick="switchHomeTab('paths')">寻路</span>
      <span class="subtab" data-sub="books" onclick="switchHomeTab('books')">理想之书</span>
      <span class="subtab" data-sub="narratives" onclick="switchHomeTab('narratives')">宏大叙事</span>
    </div>
    <div id="home-tab-content" class="fade-in"></div>
  </div>

  <!-- EXPLORATION SCREEN -->
  <div class="screen" id="screen-explore">
    <div class="card fade-in" id="explore-card"></div>
  </div>

  <!-- ACTION SCREEN -->
  <div class="screen" id="screen-action">
    <div class="card fade-in" id="action-card"></div>
  </div>

  <!-- PROFILE SCREEN -->
  <div class="screen" id="screen-profile">
    <div class="card fade-in" id="profile-card"></div>
  </div>

  <!-- COMMUNITY SCREEN -->
  <div class="screen" id="screen-community">
    <div class="card fade-in" id="community-card"></div>
  </div>

</div>
<div id="modal-container"></div>

<script>
// ============================================================
// DATA
// ============================================================

const PATH_META = {
  reflect: { name: "静思 · 与自己对话", emoji: "🌙", desc: "准备好纸笔（或就在这里写），给自己一段不被打扰的时间。下面几个问题没有标准答案，只有真实的你。" },
  act: { name: "行动 · 在尝试中感受", emoji: "🔥", desc: "有些答案只在行动中浮现。我们为你设计几个微型实验，做完了再回来写感受。" },
  dialogue: { name: "对话 · 在表达中理清", emoji: "💬", desc: "我会持续追问，像一位不带评判的朋友。你不需要完美的答案，只需要诚实的回应。" },
  observe: { name: "观照 · 从他人身上看见", emoji: "👁️", desc: "阅读下面这些真实写下的理想档案。哪些地方引起了你的共鸣？哪些让你觉得「这也是我想要的」？" },
  frame: { name: "建构 · 用框架分析自我", emoji: "🧭", desc: "从多个维度系统地审视自己。不需要一次填完，但越诚实，结果越有用。" }
};

const REFLECT_PROMPTS = [
  { q: "童年时，你最喜欢做什么事？那时的你为什么感到快乐？", hint: "不要评判它是否「有用」，只是回忆。" },
  { q: "你曾经羡慕过谁？羡慕他/她的什么？", hint: "羡慕是一面镜子，照出你真正渴望的东西。" },
  { q: "如果完全不会失败，你最想尝试的一件事是什么？", hint: "去掉恐惧之后，剩下的就是方向。" },
  { q: "你希望80岁的自己如何评价这一生？", hint: "从终点回望，什么才真正重要。" },
  { q: "什么样的时刻让你觉得「这才是我」？描述一个具体的场景。", hint: "也许只是一个瞬间，但它有线索。" }
];

const ACT_EXPERIMENTS = [
  { title: "做一件你一直想但没做的事", desc: "哪怕很小——画一幅画、写一篇文章、和一个陌生人聊天、做一道从没做过的菜。花30分钟，就今天。", q: "做完之后，你的感受是什么？过程中有没有哪个瞬间让你觉得投入或享受？" },
  { title: "观察你一周中的高峰时刻", desc: "接下来一周，每天记录三个让你觉得充实或愉悦的时刻。不是刷手机的快乐，而是做完之后觉得「今天没白过」的那种。", q: "回顾你的记录，有没有什么规律？这些时刻在做什么类型的事？" },
  { title: "和一个你做不来的人聊聊", desc: "找一个和你走在完全不同道路上的人——不同的行业、不同的生活方式——和他/她聊一聊，问问对方为什么选择这条路。", q: "对方的哪一个观点让你觉得意外或触动？为什么？" },
  { title: "想象你的「反事实人生」", desc: "选一个你人生中的转折点。如果当时你做了另一个选择，你现在会在做什么？认真想象那条路。", q: "那个平行世界里的你，拥有你现在缺少的什么？你现在拥有的，有没有那个世界里的你也羡慕的？" }
];

const DIALOGUE_START = { q: "告诉我，最近一次让你觉得「这件事值得做」是什么时候？", name: "q1" };
const DIALOGUE_FOLLOWUPS = {
  q1: { q: "那种「值得」的感觉，具体来自哪里——是事情本身有趣，还是它带来的结果让你满足？", next: "q2" },
  q2: { q: "如果剥离外在的认可（钱、掌声、别人的看法），你还会做类似的事吗？", next: "q3" },
  q3: { q: "如果不考虑任何现实限制，你希望把生命中接下来十年投入到什么事情上？", next: "q4" },
  q4: { q: "你说出了那个方向。现在想想，你已经在为它做什么了？哪怕很小。", next: "q5" },
  q5: { q: "最后一个问题：如果五年后你回头看今天的自己，你最希望今天的你迈出的第一步是什么？", next: null }
};

const SAMPLE_PROFILES = [

function startPath(path) { currentPath = path; currentStep = 0; answers = {}; dialogueHistory = []; navigate("explore"); renderExploreStep(); }

function getPathLength() {
  if (currentPath === "reflect") return REFLECT_PROMPTS.length;
  if (currentPath === "act") return ACT_EXPERIMENTS.length;
  if (currentPath === "dialogue") return Object.keys(DIALOGUE_FOLLOWUPS).length + 1;
  if (currentPath === "observe") return 1;
  if (currentPath === "frame") return FRAME_DIMENSIONS.length;

  const card = document.getElementById("explore-card");

    card.innerHTML = '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;"><span style="font-size:1.8rem;">' + meta.emoji + '</span><div><span style="font-weight:700;font-size:1.1rem;">' + meta.name + '</span><span style="color:var(--muted);font-size:0.8rem;display:block;">第 ' + (currentStep + 1) + ' 步 / 共 ' + (getPathLength() + 1) + ' 步</span></div></div><p class="sub">' + meta.desc + '</p><button class="btn btn-primary" onclick="advanceExplore()">开始</button><button class="btn btn-ghost" onclick="navigate(\'home\')" style="margin-left:8px;">返回</button>';
    return;

  else if (currentPath === "dialogue") renderDialogueStep(card);
  else if (currentPath === "observe") renderObserveStep(card);
  else if (currentPath === "frame") renderFrameStep(card);

function advanceExplore() {
  currentStep++;
  if (currentPath === "reflect" && currentStep > REFLECT_PROMPTS.length) { buildProfileFromAnswers(); return; }
  if (currentPath === "act" && currentStep > ACT_EXPERIMENTS.length) { buildProfileFromAnswers(); return; }
  if (currentPath === "dialogue" && currentStep > Object.keys(DIALOGUE_FOLLOWUPS).length + 1) { buildProfileFromAnswers(); return; }
  if (currentPath === "observe" && currentStep > 1) { buildProfileFromAnswers(); return; }
  if (currentPath === "frame" && currentStep > FRAME_DIMENSIONS.length) { buildProfileFromAnswers(); return; }
  renderExploreStep();
}

ents.length === 0 ? '<p style="color:var(--muted);font-size:0.85rem;">完成里程碑来点亮你的第一个成就……</p>' : '') + '</div><div class="share-bar"><button class="btn btn-outline btn-sm" onclick="shareAchievements()">📤 分享成就</button><button class="btn btn-outline btn-sm" onclick="shareMilestones()">📋 复制里程碑</button></div></div>';

function checkMilestone(idx) {
  var plan = loadActionPlan(); if (!plan) return;
  plan.milestones[idx].done = !plan.milestones[idx].done;
  if (plan.milestones[idx].done) {
    var achs = loadAchievements();
    var m = plan.milestones[idx];
    achs.push({ name: m.title, icon: m.icon, date: new Date().toLocaleDateString("zh-CN") });
    saveAchievements(achs);
  } else {
    var achs = loadAchievements();
    var m = plan.milestones[idx];
    var found = -1;
    for (var i = achs.length - 1; i >= 0; i--) { if (achs[i].name === m.title) { found = i; break; } }
    if (found >= 0) achs.splice(found, 1);
    saveAchievements(achs);
  }
  saveActionPlan(plan);
  var card = document.getElementById("action-card"), p = loadProfile();
  renderActionDashboard(card, p, plan);
}

function importData(event) {

        id: "import_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6),
        name: data.name || "一位朋友",
        date: data.date || "",
        statement: data.statement || "",
        values: data.values || [],
        progress: (data.achievements && data.achievements.length > 0)
          ? "已点亮 " + data.achievements.length + " 个成就：" + data.achievements.map(function(a) { return a.name; }).join("、")
          : (data.actions || "")
      });
      renderCommunity();
      var toast = document.createElement("div"); toast.className = "copied-toast"; toast.textContent = "「" + (data.name || "朋友") + "」的档案已加入广场！";
      document.body.appendChild(toast); setTimeout(function() { toast.remove(); }, 2500);
    } catch (err) { alert("文件解析失败，请确认是「理想罗盘」导出的 JSON 文件。"); }
  };
  reader.readAsText(file);
  event.target.value = "";
}

// ============================================================
// UTILS
// ============================================================

function escapeHtml(str) { if (!str) return ""; var div = document.createElement("div"); div.textContent = str; return div.innerHTML; }

// ============================================================
// INIT
// ============================================================

idealProfile = loadProfile();
renderHomeTab();
</script>
